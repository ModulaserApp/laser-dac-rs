# Convenience aliases so local runs mirror CI, which always uses `--all-features`.
#
# A plain `cargo test` uses the default feature set, which compiles OUT the
# feature-gated integration tests (e.g. `receiver_server.rs` needs `receiver`,
# which is not a default feature). That silently runs only a fraction of the
# e2e suite locally while CI runs all of it. Prefer these aliases (or the
# `--all-features` flag) so what passes locally is what CI checks.
[alias]
# Full test suite exactly as CI's `test` job runs it.
test-ci = "test --all-features"
# Check/clippy over all features. NOTE: CI's `check`/`clippy` jobs do NOT pass
# `--all-targets`; these aliases add it so examples/tests/benches are checked
# locally too. That is strictly stricter than CI (it can only catch MORE), so a
# green alias still implies a green CI check/clippy job.
check-ci = "check --all-features --all-targets"
clippy-ci = "clippy --all-features --all-targets -- -D warnings"
# Docs exactly as CI's `doc` job runs them. CI also sets
# `RUSTDOCFLAGS="-D warnings"` to make broken intra-doc links fatal; a cargo
# alias cannot set env vars, so run this alias with that env set to match CI:
#   RUSTDOCFLAGS="-D warnings" cargo doc-ci
# (The `.githooks/pre-commit` hook already sets it for you.)
doc-ci = "doc --all-features --no-deps"
